# Docker Compose for running all test levels.
#
# Uses profiles to start only the services needed for each test type:
#
#   Unit tests (no infra):
#     docker compose -f docker-compose.test.yml run --rm unit-tests
#
#   Integration tests (Kafka, Redis, OpenSearch, PostgreSQL):
#     docker compose -f docker-compose.test.yml --profile integration up -d --wait
#     docker compose -f docker-compose.test.yml run --rm integration-tests
#     docker compose -f docker-compose.test.yml --profile integration down
#
#   E2E tests (full stack from docker-compose.yml must be running):
#     docker compose up --build -d
#     docker compose -f docker-compose.test.yml run --rm e2e-tests
#     docker compose down

services:

  # ── Test runners ──────────────────────────────────────────────────────────

  unit-tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles: ["unit"]
    command: ["-v", "--tb=short", "-m", "not integration and not e2e", "tests/"]

  integration-tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles: ["integration"]
    command: ["-v", "--tb=short", "-m", "integration", "tests/"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_SECURITY_PROTOCOL: SASL_PLAINTEXT
      KAFKA_SASL_MECHANISM: PLAIN
      KAFKA_SASL_USERNAME: admin
      KAFKA_SASL_PASSWORD: admin-secret
      REDIS_URL: redis://redis:6379/0
      OPENSEARCH_URL: http://opensearch:9200
      DB_DSN: postgresql://chris:chris1234@postgres:5432/chris_streaming_test
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - test

  e2e-tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles: ["e2e"]
    command: ["-v", "--tb=long", "-m", "e2e", "-s", "tests/"]
    environment:
      SSE_SERVICE_URL: http://sse-service:8080
      PFCON_URL: http://pfcon:30005
      REDIS_URL: redis://redis:6379/0
      OPENSEARCH_URL: http://opensearch:9200
      DB_DSN: postgresql://chris:chris1234@postgres:5432/chris_streaming
    networks:
      - streaming

  # ── Infrastructure (integration profile) ──────────────────────────────────

  kafka:
    image: apache/kafka:3.9.0
    hostname: kafka
    profiles: ["integration"]
    environment:
      KAFKA_OPTS: "-Djava.security.auth.login.config=/etc/kafka/jaas/kafka_server_jaas.conf"
      CLUSTER_ID: "chris-test-cluster-001"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        /opt/kafka/bin/kafka-storage.sh format \
          --config /opt/kafka/config/server.properties \
          --cluster-id "$$CLUSTER_ID" \
          --ignore-formatted
        exec /opt/kafka/bin/kafka-server-start.sh /opt/kafka/config/server.properties
    volumes:
      - ./config/kafka/server.properties:/opt/kafka/config/server.properties:ro
      - ./config/kafka/admin.properties:/etc/kafka/admin.properties:ro
      - ./config/kafka/kafka_server_jaas.conf:/etc/kafka/jaas/kafka_server_jaas.conf:ro
    networks:
      - test
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 --command-config /etc/kafka/admin.properties > /dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 20s

  kafka-init:
    image: apache/kafka:3.9.0
    profiles: ["integration"]
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./config/kafka/init-kafka.sh:/init-kafka.sh:ro
      - ./config/kafka/admin.properties:/etc/kafka/admin.properties:ro
    entrypoint: ["bash", "/init-kafka.sh"]
    networks:
      - test
    restart: "no"

  redis:
    image: redis:7-alpine
    profiles: ["integration"]
    networks:
      - test
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:2.18.0
    profiles: ["integration"]
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms256m -Xmx256m"
    networks:
      - test
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    profiles: ["integration"]
    environment:
      POSTGRES_DB: chris_streaming_test
      POSTGRES_USER: chris
      POSTGRES_PASSWORD: chris1234
    networks:
      - test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chris -d chris_streaming_test"]
      interval: 3s
      timeout: 3s
      retries: 10

networks:
  test:
  streaming:
    external: true
    name: chris_streaming_workers_streaming
