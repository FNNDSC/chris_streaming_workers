server {
    listen 8888;
    server_name localhost;

    # Serve static files (no-cache for dev — prevents stale JS)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Proxy to SSE service (in-cluster DNS). The UI's JS uses SSE_BASE='/sse'
    # so all API and SSE traffic is reverse-proxied through this nginx.
    location /sse/ {
        proxy_pass http://sse-service.chris-streaming.svc:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        # SSE needs long timeouts
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
