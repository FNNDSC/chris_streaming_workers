---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: chris-streaming
  labels:
    app: kafka
spec:
  clusterIP: None
  # Required so the broker can resolve "kafka" via DNS *before* its
  # readiness probe passes (controller.quorum.voters points at kafka:9093,
  # which must resolve during startup). Without this, headless services
  # only publish ready endpoints, producing UnknownHostException on boot.
  publishNotReadyAddresses: true
  selector:
    app: kafka
  ports:
    - name: client
      port: 9092
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: chris-streaming
  labels:
    app: kafka
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.9.0
          env:
            - name: KAFKA_OPTS
              value: "-Djava.security.auth.login.config=/etc/kafka/jaas/kafka_server_jaas.conf"
            - name: CLUSTER_ID
              value: "chris-streaming-dev-001"
          command: ["/bin/bash", "-c"]
          args:
            - |
              /opt/kafka/bin/kafka-storage.sh format \
                --config /opt/kafka/config/server.properties \
                --cluster-id "$CLUSTER_ID" \
                --ignore-formatted
              exec /opt/kafka/bin/kafka-server-start.sh /opt/kafka/config/server.properties
          ports:
            - containerPort: 9092
              name: client
            - containerPort: 9093
              name: controller
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
            - name: kafka-config
              mountPath: /opt/kafka/config/server.properties
              subPath: server.properties
              readOnly: true
            - name: kafka-config
              mountPath: /etc/kafka/admin.properties
              subPath: admin.properties
              readOnly: true
            - name: kafka-config
              mountPath: /etc/kafka/jaas/kafka_server_jaas.conf
              subPath: kafka_server_jaas.conf
              readOnly: true
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 --command-config /etc/kafka/admin.properties > /dev/null 2>&1
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 10
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 60
            periodSeconds: 20
      volumes:
        - name: kafka-config
          configMap:
            name: kafka-config
            defaultMode: 0644
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-init
  namespace: chris-streaming
  labels:
    app: kafka-init
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app: kafka-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: kafka-init
          image: apache/kafka:3.9.0
          command: ["bash", "/init/init-kafka.sh"]
          volumeMounts:
            - name: kafka-init
              mountPath: /init/init-kafka.sh
              subPath: init-kafka.sh
              readOnly: true
            - name: kafka-config
              mountPath: /etc/kafka/admin.properties
              subPath: admin.properties
              readOnly: true
      volumes:
        - name: kafka-init
          configMap:
            name: kafka-init-script
            defaultMode: 0755
        - name: kafka-config
          configMap:
            name: kafka-config
