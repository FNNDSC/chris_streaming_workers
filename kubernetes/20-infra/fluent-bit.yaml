---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit
  namespace: chris-streaming
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: chris-streaming-fluent-bit
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: chris-streaming-fluent-bit
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: chris-streaming-fluent-bit
subjects:
  - kind: ServiceAccount
    name: fluent-bit
    namespace: chris-streaming
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: chris-streaming
  labels:
    app: fluent-bit
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
    spec:
      serviceAccountName: fluent-bit
      tolerations:
        - operator: Exists
          effect: NoSchedule
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:3.2
          env:
            - name: KAFKA_BROKERS
              value: kafka:9092
            - name: KAFKA_SASL_USERNAME
              value: log-producer
            - name: KAFKA_SASL_PASSWORD
              value: log-producer-secret
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc/fluent-bit.conf
              subPath: fluent-bit-k8s.conf
              readOnly: true
            - name: config
              mountPath: /fluent-bit/etc/parsers-k8s.conf
              subPath: parsers-k8s.conf
              readOnly: true
            - name: config
              mountPath: /fluent-bit/etc/enrich-k8s.lua
              subPath: enrich-k8s.lua
              readOnly: true
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibcontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: db
              mountPath: /fluent-bit/db
          ports:
            - containerPort: 2020
              name: http
      volumes:
        - name: config
          configMap:
            name: fluent-bit-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibcontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: db
          emptyDir: {}
