---
apiVersion: v1
kind: Service
metadata:
  name: pfcon
  namespace: chris-streaming
  labels:
    app: pfcon
spec:
  type: NodePort
  selector:
    app: pfcon
  ports:
    - port: 30005
      targetPort: 30005
      nodePort: 30005
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pfcon
  namespace: chris-streaming
  labels:
    app: pfcon
    org.chrisproject.role: pfcon
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pfcon
  template:
    metadata:
      labels:
        app: pfcon
        org.chrisproject.role: pfcon
    spec:
      serviceAccountName: pfcon
      containers:
        - name: pfcon
          image: ghcr.io/fnndsc/pfcon:latest
          command: ["gunicorn", "-b", "0.0.0.0:30005", "-w", "4", "-t", "120", "pfcon.wsgi:application"]
          ports:
            - containerPort: 30005
          env:
            - name: APPLICATION_MODE
              value: production
            - name: SECRET_KEY
              value: dev-secret-key
            - name: PFCON_USER
              value: pfcon
            - name: PFCON_PASSWORD
              value: pfcon1234
            - name: PFCON_INNETWORK
              value: "true"
            - name: STORAGE_ENV
              value: fslink
            - name: STOREBASE_MOUNT
              value: /var/local/storeBase
            - name: CONTAINER_ENV
              value: kubernetes
            - name: COMPUTE_VOLUME_TYPE
              value: kubernetes_pvc
            - name: VOLUME_NAME
              value: storebase-pvc
            - name: JOB_NAMESPACE
              value: chris-streaming
            # JOB_LABELS is applied raw (no translation) to every pfcon-spawned
            # pod. We use a K8s-idiomatic domain/key label the streaming workers
            # select on (vs. Docker's flat org.chrisproject.miniChRIS key).
            - name: JOB_LABELS
              value: "chrisproject.org/role=plugininstance"
            - name: REMOVE_JOBS
              value: "yes"
          volumeMounts:
            - name: storebase
              mountPath: /var/local/storeBase
          readinessProbe:
            tcpSocket:
              port: 30005
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 30005
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: storebase
          persistentVolumeClaim:
            claimName: storebase-pvc
