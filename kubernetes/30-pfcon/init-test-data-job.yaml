---
apiVersion: batch/v1
kind: Job
metadata:
  name: init-test-data
  namespace: chris-streaming
  labels:
    app: init-test-data
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: init-test-data
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init-test-data
          image: alpine:latest
          command: ["sh", "/init/init-test-data.sh"]
          volumeMounts:
            - name: script
              mountPath: /init
              readOnly: true
            - name: storebase
              mountPath: /var/local/storeBase
      volumes:
        - name: script
          configMap:
            name: init-test-data-script
            defaultMode: 0755
        - name: storebase
          persistentVolumeClaim:
            claimName: storebase-pvc
