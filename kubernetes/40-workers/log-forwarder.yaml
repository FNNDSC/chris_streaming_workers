---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: log-forwarder
  namespace: chris-streaming
  labels:
    app: log-forwarder
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: log-forwarder
  namespace: chris-streaming
  labels:
    app: log-forwarder
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  # Leader election: see event-forwarder-rbac.yaml for why.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: log-forwarder
  namespace: chris-streaming
  labels:
    app: log-forwarder
subjects:
  - kind: ServiceAccount
    name: log-forwarder
    namespace: chris-streaming
roleRef:
  kind: Role
  name: log-forwarder
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-forwarder
  namespace: chris-streaming
  labels:
    app: log-forwarder
spec:
  # Two replicas for HA. See event-forwarder.yaml for the leader-election
  # rationale — a Lease gates log emission so only one replica tails
  # container logs at a time.
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: log-forwarder
  template:
    metadata:
      labels:
        app: log-forwarder
    spec:
      serviceAccountName: log-forwarder
      containers:
        - name: log-forwarder
          image: localhost:5005/fnndsc/compute-log-forwarder:dev
          imagePullPolicy: Always
          env:
            - name: COMPUTE_ENV
              value: kubernetes
            - name: K8S_NAMESPACE
              value: chris-streaming
            - name: K8S_LABEL_SELECTOR
              value: "chrisproject.org/role=plugininstance"
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: STREAM_LOGS_BASE
              value: stream:job-logs
            - name: STREAM_NUM_SHARDS
              value: "8"
            - name: K8S_LEADER_NAMESPACE
              value: chris-streaming
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: K8S_LEADER_IDENTITY
              value: "$(POD_NAME)"
