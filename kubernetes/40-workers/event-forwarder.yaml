---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-forwarder
  namespace: chris-streaming
  labels:
    app: event-forwarder
spec:
  # Two replicas for HA. A Lease (coordination.k8s.io) gates emission so
  # only one replica at a time produces StatusEvents; the follower stays
  # warm and can take over within `lease_duration_seconds` if the leader
  # dies or is evicted.
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: event-forwarder
  template:
    metadata:
      labels:
        app: event-forwarder
    spec:
      serviceAccountName: event-forwarder
      containers:
        - name: event-forwarder
          image: localhost:5005/fnndsc/compute-event-forwarder:dev
          imagePullPolicy: Always
          env:
            - name: COMPUTE_ENV
              value: kubernetes
            - name: K8S_NAMESPACE
              value: chris-streaming
            - name: K8S_LABEL_SELECTOR
              value: "chrisproject.org/role=plugininstance"
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: STREAM_STATUS_BASE
              value: stream:job-status
            - name: STREAM_NUM_SHARDS
              value: "8"
            - name: EMIT_INITIAL_STATE
              value: "true"
            - name: K8S_LEADER_NAMESPACE
              value: chris-streaming
            # Downward API: expose the Pod name so the Lease
            # ``holderIdentity`` is human-readable.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: K8S_LEADER_IDENTITY
              value: "$(POD_NAME)"
