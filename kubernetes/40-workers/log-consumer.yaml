---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-consumer
  namespace: chris-streaming
  labels:
    app: log-consumer
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: log-consumer
  template:
    metadata:
      labels:
        app: log-consumer
    spec:
      containers:
        - name: log-consumer
          image: localhost:5005/fnndsc/compute-log-consumer:dev
          imagePullPolicy: Always
          env:
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: STREAM_LOGS_BASE
              value: stream:job-logs
            - name: STREAM_LOGS_DLQ
              value: stream:job-logs-dlq
            - name: STREAM_NUM_SHARDS
              value: "8"
            - name: LOG_CONSUMER_GROUP
              value: log-consumer-group
            - name: OPENSEARCH_URL
              value: http://opensearch:9200
            - name: BATCH_MAX_SIZE
              value: "200"
            - name: BATCH_MAX_WAIT_SECONDS
              value: "2.0"
