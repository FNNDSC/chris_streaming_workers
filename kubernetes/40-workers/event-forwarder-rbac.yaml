---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: event-forwarder
  namespace: chris-streaming
  labels:
    app: event-forwarder
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: event-forwarder
  namespace: chris-streaming
  labels:
    app: event-forwarder
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Leader election: the event-forwarder holds a coordination.k8s.io Lease
  # so only one replica emits events at a time. Without this, multiple
  # replicas would race, producing duplicate StatusEvents whose event_ids
  # diverge (timestamp is per-process) so downstream dedup can't coalesce
  # them.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: event-forwarder
  namespace: chris-streaming
  labels:
    app: event-forwarder
subjects:
  - kind: ServiceAccount
    name: event-forwarder
    namespace: chris-streaming
roleRef:
  kind: Role
  name: event-forwarder
  apiGroup: rbac.authorization.k8s.io
