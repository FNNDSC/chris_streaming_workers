# Integration test infrastructure in chris-streaming-test namespace.
# Standalone copy of redis/quickwit/postgres — no PVCs (ephemeral).
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: chris-streaming-test
  labels:
    app: redis
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: chris-streaming-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args:
            - redis-server
            - --appendonly
            - "yes"
            - --appendfsync
            - everysec
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 2
            periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: quickwit
  namespace: chris-streaming-test
  labels:
    app: quickwit
spec:
  selector:
    app: quickwit
  ports:
    - port: 7280
      targetPort: 7280
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quickwit
  namespace: chris-streaming-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quickwit
  template:
    metadata:
      labels:
        app: quickwit
    spec:
      containers:
        - name: quickwit
          image: quickwit/quickwit:latest
          args: ["run"]
          env:
            - name: QW_METASTORE_URI
              value: "file:///quickwit/qwdata/metastore"
            - name: QW_DEFAULT_INDEX_ROOT_URI
              value: "file:///quickwit/qwdata/indexes"
          ports:
            - containerPort: 7280
          readinessProbe:
            httpGet:
              path: /health/livez
              port: 7280
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: chris-streaming-test
type: Opaque
stringData:
  POSTGRES_DB: chris_streaming_test
  POSTGRES_USER: chris
  POSTGRES_PASSWORD: chris1234
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: chris-streaming-test
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: chris-streaming-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          envFrom:
            - secretRef:
                name: postgres-credentials
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 5
            periodSeconds: 3
