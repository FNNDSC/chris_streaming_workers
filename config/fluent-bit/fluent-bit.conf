# ============================================================================
# Fluent Bit configuration for ChRIS streaming workers.
#
# Strategy:
#   1. Tail all Docker JSON log files
#   2. Use Path_Key to capture container ID from file path
#   3. Lua filter resolves container name + labels via a lookup file
#      that the Event Forwarder updates, OR via parsing the file path
#   4. Forward matching logs to Kafka job-logs topic
#
# Note: The deprecated 'docker' filter plugin is NOT used. Container
# metadata is resolved entirely in the Lua filter using the container
# ID extracted from the log file path.
# ============================================================================

[SERVICE]
    Flush           1
    Log_Level       info
    Parsers_File    /fluent-bit/etc/parsers.conf
    HTTP_Server     On
    HTTP_Listen     0.0.0.0
    HTTP_Port       2020

# Read Docker JSON log files
# Tag format: docker.<container_id> (extracted from path)
[INPUT]
    Name              tail
    Tag               docker.<container_id>
    Tag_Regex         /var/lib/docker/containers/(?<container_id>[^/]+)/[^/]+\.log$
    Path              /var/lib/docker/containers/*/*-json.log
    Parser            docker
    DB                /fluent-bit/db/tail.db
    Mem_Buf_Limit     50MB
    Skip_Long_Lines   On
    Refresh_Interval  5
    Docker_Mode       On
    Path_Key          log_path

# Lua filter:
#   - Extracts container_id from log_path
#   - Reads /var/lib/docker/containers/<id>/config.v2.json for name+labels
#   - Filters to only ChRIS job containers
#   - Extracts job_id and job_type
#   - Reshapes record to LogEvent schema
[FILTER]
    Name            lua
    Match           docker.*
    Script          /fluent-bit/etc/enrich.lua
    Call            enrich_log

# Output to Kafka topic job-logs, keyed by job_id
[OUTPUT]
    Name            kafka
    Match           docker.*
    Brokers         ${KAFKA_BROKERS}
    Topics          job-logs
    Format          json
    Timestamp_Key   timestamp
    rdkafka.security.protocol          SASL_PLAINTEXT
    rdkafka.sasl.mechanism             PLAIN
    rdkafka.sasl.username              ${KAFKA_SASL_USERNAME}
    rdkafka.sasl.password              ${KAFKA_SASL_PASSWORD}
    rdkafka.compression.type           lz4
    rdkafka.queue.buffering.max.ms     500
    rdkafka.message.send.max.retries   3
    # Use job_id as the message key for partition ordering
    Message_Key_Field job_id
