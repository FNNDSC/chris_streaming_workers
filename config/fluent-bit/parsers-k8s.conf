# Parsers used by the Kubernetes Fluent Bit pipeline.
#
# cri:    containerd's CRI log format (used by most K8s runtimes including
#         newer Docker Desktop versions)
# docker: legacy JSON log format (older Docker Desktop K8s)

[PARSER]
    Name        cri
    Format      regex
    Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z

[PARSER]
    Name        docker
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%LZ
    Time_Keep   On
