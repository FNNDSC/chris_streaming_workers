# ============================================================================
# Fluent Bit configuration for Kubernetes.
#
# Strategy:
#   1. Tail /var/log/containers/*.log (symlinks to container runtime logs)
#   2. Use the built-in kubernetes filter to resolve pod metadata via the
#      K8s API (labels, annotations, namespace, pod name, owner references)
#   3. Lua filter keeps only ChRIS plugininstance pods (label
#      chrisproject.org/role=plugininstance), derives job_id/job_type, and
#      reshapes the record to match the LogEvent schema.
#   4. Forward matching logs to Kafka job-logs topic.
# ============================================================================

[SERVICE]
    Flush           1
    Log_Level       info
    Parsers_File    /fluent-bit/etc/parsers-k8s.conf
    HTTP_Server     On
    HTTP_Listen     0.0.0.0
    HTTP_Port       2020

# Tail the node's container logs. File names on K8s look like:
#   <pod>_<namespace>_<container>-<hash>.log
[INPUT]
    Name              tail
    Tag               kube.*
    Path              /var/log/containers/*.log
    # cri parser handles containerd's CRI log format; docker parser handles
    # Docker Desktop's k8s (which currently uses docker's JSON log format).
    # multiline.parser option would be cleaner, but keep simple: try cri first.
    Parser            cri
    DB                /fluent-bit/db/tail-k8s.db
    Mem_Buf_Limit     50MB
    Skip_Long_Lines   On
    Refresh_Interval  5
    Path_Key          log_path

# Kubernetes metadata filter — fetches pod labels/annotations via the API.
[FILTER]
    Name                kubernetes
    Match               kube.*
    Kube_URL            https://kubernetes.default.svc:443
    Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
    Kube_Tag_Prefix     kube.var.log.containers.
    Merge_Log           On
    Keep_Log            On
    K8S-Logging.Parser  On
    K8S-Logging.Exclude On
    Labels              On
    Annotations         Off

# Custom Lua filter: keep only ChRIS plugininstance pods and reshape record.
[FILTER]
    Name            lua
    Match           kube.*
    Script          /fluent-bit/etc/enrich-k8s.lua
    Call            enrich_log

# Output to Kafka topic job-logs, keyed by job_id.
[OUTPUT]
    Name            kafka
    Match           kube.*
    Brokers         ${KAFKA_BROKERS}
    Topics          job-logs
    Format          json
    Timestamp_Key   timestamp
    rdkafka.security.protocol          SASL_PLAINTEXT
    rdkafka.sasl.mechanism             PLAIN
    rdkafka.sasl.username              ${KAFKA_SASL_USERNAME}
    rdkafka.sasl.password              ${KAFKA_SASL_PASSWORD}
    rdkafka.compression.type           lz4
    rdkafka.queue.buffering.max.ms     500
    rdkafka.message.send.max.retries   3
    Message_Key_Field job_id
