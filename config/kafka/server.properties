# ============================================================================
# Kafka server.properties for KRaft mode with SASL/PLAIN
# Mounted into /mnt/shared/config/ to override the image defaults.
# ============================================================================

# KRaft combined mode
process.roles=broker,controller
node.id=1
controller.quorum.voters=1@kafka:9093

# Listeners — bind to all interfaces but advertise hostname
listeners=SASL_PLAINTEXT://:9092,CONTROLLER://:9093
advertised.listeners=SASL_PLAINTEXT://kafka:9092
controller.listener.names=CONTROLLER
inter.broker.listener.name=SASL_PLAINTEXT
listener.security.protocol.map=SASL_PLAINTEXT:SASL_PLAINTEXT,CONTROLLER:PLAINTEXT

# SASL/PLAIN
sasl.mechanism.inter.broker.protocol=PLAIN
sasl.enabled.mechanisms=PLAIN

# ACL authorizer
authorizer.class.name=org.apache.kafka.metadata.authorizer.StandardAuthorizer
allow.everyone.if.no.acl.found=false
# ANONYMOUS is needed for the CONTROLLER listener (PLAINTEXT, no SASL)
super.users=User:admin;User:ANONYMOUS

# Storage
log.dirs=/var/lib/kafka/data

# Broker defaults
offsets.topic.replication.factor=1
transaction.state.log.replication.factor=1
transaction.state.log.min.isr=1
log.retention.hours=72
num.partitions=1
num.network.threads=3
num.io.threads=8
