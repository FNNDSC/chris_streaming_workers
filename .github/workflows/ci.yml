# Run unit + integration tests (Docker Compose and Kubernetes/kind).
# If all tests pass, build multi-arch images and push to DockerHub + GHCR.

name: CI

on:
  push:
    branches: [ master ]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  pull_request:
    branches: [ master ]

jobs:
  test-streamers:
    name: tests (docker, ${{ matrix.target }})
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        target: [unit-tests, integration-tests, e2e-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Install just
        uses: extractions/setup-just@v2
      - name: ${{ matrix.target }}
        run: just run ${{ matrix.target }}

  test-streamers-k8s:
    name: tests (kubernetes, ${{ matrix.target }})
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        target: [unit-tests, integration-tests, e2e-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Install just
        uses: extractions/setup-just@v2
      - name: Start local Docker registry
        run: |
          docker run -d --restart=always \
            -p 127.0.0.1:5005:5000 \
            --name chris-k8s-registry registry:2
      - name: Write kind config
        run: |
          cat > /tmp/kind-config.yaml <<'EOF'
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
          - role: control-plane
            extraPortMappings:
            - containerPort: 30080
              hostPort: 30080
            - containerPort: 30888
              hostPort: 30888
            - containerPort: 30005
              hostPort: 30005
          EOF
      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: chris-streaming
          config: /tmp/kind-config.yaml
      - name: Connect registry to kind network
        run: |
          docker network connect kind chris-k8s-registry
          # Configure containerd on kind nodes to resolve localhost:5005
          # to the registry container on the kind docker network.
          for node in $(kind get nodes --name chris-streaming); do
            docker exec "$node" mkdir -p /etc/containerd/certs.d/localhost:5005
            docker exec "$node" sh -c 'cat > /etc/containerd/certs.d/localhost:5005/hosts.toml <<TOML
          [host."http://chris-k8s-registry:5000"]
            capabilities = ["pull", "resolve"]
          TOML'
            docker exec "$node" systemctl restart containerd
          done
          # Wait for containerd and kubelet to recover after restart.
          sleep 5
          kubectl wait --for=condition=Ready nodes --all --timeout=120s
      - name: Build and push images to local registry
        run: just k8s-build
      - name: ${{ matrix.target }} (k8s)
        run: just k8s-run ${{ matrix.target }}

  build:
    needs: [test-streamers, test-streamers-k8s]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: compute-event-forwarder
            dockerfile: ./Dockerfile.event_forwarder
          - image: compute-status-consumer
            dockerfile: ./Dockerfile.status_consumer
          - image: compute-logs-consumer
            dockerfile: ./Dockerfile.log_consumer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            docker.io/fnndsc/${{ matrix.image }}
            ghcr.io/fnndsc/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=pep440,pattern={{version}}
            type=pep440,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        id: login-dockerhub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Login to GitHub Container Registry
        id: login-ghcr
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: ${{ steps.login-dockerhub.outcome == 'success' && steps.login-ghcr.outcome == 'success' }}
          context: .
          file: ${{ matrix.dockerfile }}
          # Skip ppc64le on PRs (QEMU build adds ~5 min); full matrix on push/tag.
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64,linux/arm64' || 'linux/amd64,linux/arm64,linux/ppc64le' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
